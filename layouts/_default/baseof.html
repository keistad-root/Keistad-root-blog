<!doctype html>
<html lang="ko">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>{{ if .Title }}{{ .Title }} | {{ end }}{{ .Site.Title }}</title>
		<meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
		<style>
			* {
				box-sizing: border-box;
			}

			html {
				scroll-behavior: smooth;
			}

			body {
				min-height: 100vh;
				padding-top: 80px;
				font-family: "Helvetica Neue", Helvetica, Arial, "Apple SD Gothic Neo", sans-serif;
				color: #212529;
				font-size: 1.2rem;
				background-color: #ffffff;
			}

			a {
				color: #6b3f1d;
				text-decoration: none;
			}

			a:hover {
				color: #2f1c0d;
				text-decoration: underline;
			}

			.navbar-custom {
				background-color: #3d2b1f;
				border-bottom: 1px solid #3d2b1f;
				box-shadow: none;
			}

			.nav-container {
				align-items: center;
			}

			.navbar-brand,
			.nav-link {
				color: #212529;
				font-size: 0.95rem;
				letter-spacing: 0.04em;
			}

			.navbar-custom .navbar-brand {
				color: #f5f5dc;
				font-size: 2rem;
			}

			.navbar-custom .nav-link {
				color: #f5f5dc;
				font-size: 1rem;
			}

			.navbar-brand:hover,
			.nav-link:hover {
				color: #6b3f1d;
				text-decoration: none;
			}

			.navbar-custom .navbar-brand:hover,
			.navbar-custom .nav-link:hover {
				color: #daa06d;
			}

			.site-container {
				padding-top: 80px;
				max-width: 1500px;
				margin-top: 0;
				margin-bottom: 2rem;
			}

			.side {
				position: sticky;
				top: 100px;
				align-self: flex-start;
			}

			.content {
				padding: 0 1.5rem 2rem;
			}

			.profile-card,
			.mobile-profile {
				border: 1px solid #dee2e6;
				box-shadow: none;
			}

			.profile-image {
				width: 75%;
				margin: 0 auto 1rem;
				border-radius: 50%;
				border: 3px solid #eeeeee;
				display: block;
			}

			.profile-subtitle {
				margin-bottom: 1rem;
				font-size: 0.95rem;
				color: #6c757d;
			}

			.profile-links a + a {
				margin-left: 0.75rem;
			}

			.page-title {
				margin-bottom: 1.5rem;
				padding-bottom: 0.5rem;
				font-size: 2.4rem;
				font-weight: 600;
				border-bottom: 1px solid #dee2e6;
				line-height: 1;
			}

			.grid-container {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 16px;
				padding-top: 1rem;
			}

			.grid-item {
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100px;
				padding: 24px;
				text-align: center;
				border: 4px solid #d6b588;
				border-radius: 8px;
				background: #ffeed4;
			}

			.grid-item-wide {
				grid-column: 1 / -1;
			}

			.grid-item h4 {
				margin: 0;
				font-size: 1.35rem;
				font-weight: 600;
			}

			.topic-links {
				display: flex;
				flex-wrap: wrap;
				gap: 0.75rem 1rem;
			}

			.topic-links a {
				font-weight: 500;
			}

			.content h2,
			.content h3 {
				line-height: 1;
				padding-bottom: 0.1rem;
				border-bottom: 2px solid #b08a63;
			}

			.content h4,
			.content h5,
			.content p,
			.content li {
				line-height: 1.5;
			}

			.content h2 {
				margin-top: 2rem;
				margin-bottom: 1rem;
				font-size: 1.7rem;
			}

			.content h3,
			.content h5 {
				margin-top: 1rem;
				margin-bottom: 0.5rem;
				font-size: 1.2rem;
				font-weight: 600;
			}

			.content-body {
				font-size: 1rem;
			}

			.content-body p {
				margin-bottom: 1rem;
			}

			.content-body ul,
			.content-body ol {
				padding-left: 1.25rem;
			}

			.content-body img {
				max-width: 100%;
				height: auto;
			}

			.toc-card {
				margin-bottom: 1.5rem;
			}

			.toc-card h5 {
				margin-top: 0;
				margin-bottom: 0.75rem;
				font-size: 1rem;
				font-weight: 600;
				border-bottom: 0;
			}

			.header-list {
				padding-left: 0;
				list-style: none;
			}

			.header-list ul {
				padding-left: 1rem;
				list-style: none;
			}

			.header-list li + li {
				margin-top: 0.35rem;
			}

			.header-list a {
				display: block;
				color: #6b3f1d;
			}

			.plain-list,
			.detail-list,
			.link-list {
				padding-left: 1.2rem;
				margin-bottom: 0;
			}

			.nested-list {
				padding-left: 1.2rem;
				margin-top: 0.35rem;
				margin-bottom: 0.75rem;
			}

			.plain-list li,
			.detail-list li,
			.link-list li,
			.grid-item p {
				margin-bottom: 0.55rem;
			}

			.plain-list li:last-child,
			.detail-list li:last-child,
			.link-list li:last-child,
			.grid-item p:last-child {
				margin-bottom: 0;
			}

			.footer-note {
				margin-top: 1.5rem;
				font-size: 0.9rem;
				color: #6c757d;
			}

			.mobile-profile {
				margin-bottom: 1.5rem;
			}

			@media (max-width: 991.98px) {
				body {
					padding-top: 74px;
				}

				.site-container {
					padding-top: 1rem;
				}

				.content {
					padding: 0 0 1.5rem;
				}

				.mobile-profile {
					margin-bottom: 2rem;
				}
			}

			@media (max-width: 767.98px) {
				.page-title {
					font-size: 2rem;
				}

				.grid-container {
					grid-template-columns: repeat(2, 1fr);
					gap: 1rem;
				}

				.profile-image {
					width: 140px;
				}

				.navbar-brand,
				.nav-link {
					font-size: 0.85rem;
				}
				}

			@media (max-width: 575.98px) {
				.grid-container {
					grid-template-columns: 1fr;
				}

				.navbar-custom .navbar-brand {
					font-size: 1.4rem;
				}
			}
			}
		</style>
	</head>
	<body>
		{{ block "main" . }}{{ end }}
	</body>
</html>
